<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini CDN Video</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Mini CDN Video v2</h1>

      <section class="card">
        <h2>Upload Video</h2>
        <form id="uploadForm">
          <input type="file" id="videoFile" name="video" accept="video/*" required />
          <button type="submit">Upload</button>
        </form>
        <progress id="uploadProgress" value="0" max="100" hidden></progress>
        <p id="status"></p>
      </section>

      <section class="card">
        <h2>Available Videos</h2>
        <div class="toolbar">
          <input type="search" id="searchInput" placeholder="Search by file name..." />
          <button id="refreshBtn" type="button">Refresh</button>
        </div>
        <ul id="videoList"></ul>
      </section>

      <section class="card">
        <h2>Player</h2>
        <video id="player" controls preload="metadata" width="100%"></video>
        <div class="urlBlock">
          <label for="streamUrl">CDN URL (paste in video tag)</label>
          <input id="streamUrl" type="text" readonly />
        </div>
        <div class="urlBlock">
          <label for="videoTagSnippet">HTML video tag</label>
          <textarea id="videoTagSnippet" rows="3" readonly></textarea>
        </div>
        <div class="actionsRow">
          <button id="copyUrlBtn" type="button">Copy URL</button>
          <button id="copyTagBtn" type="button">Copy Video Tag</button>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>

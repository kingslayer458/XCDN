events {
    worker_connections 1024;
}

http {
    upstream xcdn {
        server xcdn:7000;
    }

    # HTTP - Redirect all to HTTPS
    server {
        listen 80;
        server_name cdn.kingcloud.live;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        http2 on;
        server_name cdn.kingcloud.live;

        ssl_certificate /etc/letsencrypt/live/cdn.kingcloud.live/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cdn.kingcloud.live/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
      
        client_max_body_size 5120m;
        proxy_connect_timeout 3600s;
        proxy_send_timeout    3600s;
        proxy_read_timeout    3600s;

       # proxy_request_buffering off;
         proxy_request_buffering on;  # Faster uploads
         proxy_buffering on;          # Faster responses/downloads
         sendfile on;                 # Faster file serving
         tcp_nodelay on;              # Lower latency

        location / {
            proxy_pass http://xcdn;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
